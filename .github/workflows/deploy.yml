name: Deploy to Cloudflare

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ADMIN_TOKEN: ${{ secrets.ZJMF_ADMIN_TOKEN || secrets.UPTIMER_ADMIN_TOKEN }}
      WORKER_NAME: ${{ vars.WORKER_NAME || 'zjmf-monitor-nas' }}
      D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME || 'zjmf-monitor-nas' }}
      ZJMF_API_ACCOUNT: ${{ secrets.ZJMF_API_ACCOUNT }}
      ZJMF_API_PASSWORD: ${{ secrets.ZJMF_API_PASSWORD }}
      ZJMF_SERVER_ID: ${{ secrets.ZJMF_SERVER_ID }}
      ZJMF_SERVER_IP: ${{ secrets.ZJMF_SERVER_IP }}
      ZJMF_SERVER_NAME: ${{ secrets.ZJMF_SERVER_NAME }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Normalize Cloudflare token
        shell: bash
        run: |
          token="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\r\n')"
          token="${token#Bearer }"
          token="${token#bearer }"
          test -n "$token" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          case "$token" in *[[:space:]]*) echo "CLOUDFLARE_API_TOKEN contains whitespace"; exit 1;; esac
          printf 'CLOUDFLARE_API_TOKEN=%s\n' "$token" >> "$GITHUB_ENV"

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$ADMIN_TOKEN" || (echo "Missing ZJMF_ADMIN_TOKEN" && exit 1)

      - name: Run tests
        run: npm test

      - name: Create or reuse D1 database
        id: d1
        run: node scripts/prepare-cloudflare.mjs

      - name: Apply D1 migrations
        run: npx wrangler@latest d1 migrations apply "$D1_DATABASE_NAME" --remote

      - name: Upload admin token
        shell: bash
        run: printf "%s" "$ADMIN_TOKEN" | npx wrangler@latest secret put ADMIN_TOKEN

      - name: Deploy Worker
        id: deploy
        shell: bash
        run: |
          npx wrangler@latest deploy | tee deploy.log
          url="$(grep -Eo 'https://[^ ]+\.workers\.dev' deploy.log | head -n 1 || true)"
          echo "worker_url=$url" >> "$GITHUB_OUTPUT"

      - name: Print URLs
        shell: bash
        run: |
          echo "Worker: ${{ steps.deploy.outputs.worker_url }}"
          echo "Status UI: ${{ steps.deploy.outputs.worker_url }}/"
          echo "Admin UI: ${{ steps.deploy.outputs.worker_url }}/admin"
          echo "Status API: ${{ steps.deploy.outputs.worker_url }}/api/status"

      - name: Optional seed monitor config
        if: ${{ env.ZJMF_API_ACCOUNT != '' && env.ZJMF_API_PASSWORD != '' && env.ZJMF_SERVER_ID != '' }}
        run: node scripts/seed-worker.mjs "${{ steps.deploy.outputs.worker_url }}"
