name: EdgeOne Monitor Bootstrap

on:
  schedule:
    - cron: "2/5 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: edgeone-monitor-bootstrap
  cancel-in-progress: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      EDGEONE_MONITOR_URL: ${{ secrets.EDGEONE_MONITOR_URL || vars.EDGEONE_MONITOR_URL }}
      EDGEONE_ADMIN_TOKEN: ${{ secrets.EDGEONE_ADMIN_TOKEN || secrets.ZJMF_ADMIN_TOKEN }}
      LOOP_WORKFLOW_FILE: edgeone-monitor-loop.yml
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Validate runtime configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EDGEONE_MONITOR_URL" || (echo "Missing EDGEONE_MONITOR_URL secret or variable" && exit 1)
          test -n "$EDGEONE_ADMIN_TOKEN" || (echo "Missing EDGEONE_ADMIN_TOKEN secret or ZJMF_ADMIN_TOKEN secret" && exit 1)

      - name: Ensure monitor loop is running
        shell: bash
        run: |
          set -euo pipefail

          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${LOOP_WORKFLOW_FILE}/runs?per_page=50&branch=${GITHUB_REF_NAME}"
          response="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "$api_url")"

          active_count="$(RESPONSE_JSON="$response" python -c "import json, os; data=json.loads(os.environ['RESPONSE_JSON']); active={'queued','in_progress','pending','requested','waiting'}; print(sum(1 for run in data.get('workflow_runs', []) if run.get('status') in active))")"

          if [ "$active_count" -gt 0 ]; then
            echo "Monitor loop already active or queued on ${GITHUB_REF_NAME}; skip bootstrap dispatch."
            exit 0
          fi

          payload="$(python -c "import json, os; print(json.dumps({'ref': os.environ['GITHUB_REF_NAME'], 'inputs': {'bootstrap_reason': os.environ['GITHUB_EVENT_NAME'], 'bootstrap_run_id': os.environ['GITHUB_RUN_ID'], 'chain_depth': '0'}}))")"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${LOOP_WORKFLOW_FILE}/dispatches"

          echo "Bootstrap dispatched monitor loop on ${GITHUB_REF_NAME}."
